<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="css/weather.css">
</head>
<body>
    <div class="weather-container">
        <header class="weather-header">
            <h1>🌤️ Weather Dashboard</h1>
            <div class="search-box">
                <input type="text" id="city-search" placeholder="Search city..." onkeypress="handleSearchKeypress(event)">
                <button onclick="searchWeather()">Search</button>
                <div id="search-suggestions" class="suggestions"></div>
            </div>
        </header>

        <main class="weather-main">
            <!-- Current Weather -->
            <section class="current-weather" id="current-weather">
                <!-- Will be loaded dynamically -->
            </section>

            <!-- 5-Day Forecast -->
            <section class="forecast-section">
                <h2>5-Day Forecast</h2>
                <div class="forecast-grid" id="forecast-grid">
                    <!-- Will be loaded dynamically -->
                </div>
            </section>

            <!-- Multiple Cities -->
            <section class="multiple-cities">
                <h2>My Cities</h2>
                <div class="cities-controls">
                    <button class="btn btn-primary" onclick="addCity()">+ Add City</button>
                </div>
                <div class="cities-grid" id="cities-grid">
                    <!-- Cities will be displayed here -->
                </div>
            </section>
        </main>
    </div>

    <script src="js/weather.js"></script>
</body>
</html>
