version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://gaming_user:gaming_password@db:5432/gaming_website
    depends_on:
      - db
    volumes:
      - .:/app
    command: python backend/run.py

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=gaming_user
      - POSTGRES_PASSWORD=gaming_password
      - POSTGRES_DB=gaming_website
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  postgres_data:
