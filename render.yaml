# Render deployment configuration\n\nruntime: python-3.11\n\nbuild:\n  builder: docker\n\nservices:\n  - type: web\n    name: gaming-website\n    runtime: docker\n    plan: free\n    numInstances: 1\n    envVars:\n      - key: FLASK_ENV\n        value: production\n      - key: PYTHON_VERSION\n        value: 3.11\n\ndatabases:\n  - name: postgres\n    plan: free\n    postgresSQLVersion: 15\n\nenvVars:\n  - key: DATABASE_URL\n    fromDatabase:\n      name: postgres\n      property: connectionString\n  - key: SECRET_KEY\n    generateValue: true\n  - key: JWT_SECRET_KEY\n    generateValue: true\n  - key: OPENWEATHER_API_KEY\n    sync: false\n